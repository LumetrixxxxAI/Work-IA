<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0284C7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Work IA" />
    <meta name="description" content="Tu asistente de estudio con inteligencia artificial" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Work IA</title>
  </head>
  <body>
    <!-- Splash screen: visible hasta que React monta -->
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      background:linear-gradient(180deg,#075985 0%,#0284C7 50%,#075985 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
      transition:opacity 0.4s ease;
    ">
      <img src="/apple-touch-icon.png" style="width:96px;height:96px;border-radius:22px;" alt="Work IA" />
      <p style="font-family:Inter,sans-serif;font-size:22px;font-weight:800;color:#fff;margin:0;letter-spacing:-0.5px;">Work IA</p>
      <p style="font-family:Inter,sans-serif;font-size:13px;color:rgba(255,255,255,0.55);margin:0;">Tu asistente de estudio</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Ocultar splash cuando React haya montado el root
      var _splash = document.getElementById('splash');
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.firstChild) {
          _splash.style.opacity = '0';
          setTimeout(function(){ _splash.style.display = 'none'; }, 400);
          _observer.disconnect();
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
